<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vault v6.1 | Pay-to-Decrypt Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; --bg: #020617; }
        body {
            background: radial-gradient(circle at top right, #083344, #020617, #000000);
            font-family: 'Outfit', sans-serif;
            color: #f1f5f9;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .solana-btn { background: linear-gradient(90deg, #9945FF 0%, #14F195 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-lg glass rounded-[3rem] p-8 relative overflow-hidden">
        <div class="flex flex-col items-center mb-10 text-center">
            <button id="connectBtn" onclick="connectWallet()" class="solana-btn text-slate-950 text-[10px] font-black px-6 py-2 rounded-full mb-6 uppercase tracking-widest shadow-lg">Connect Wallet</button>
            <h1 class="text-4xl font-black text-white uppercase tracking-tighter">VAULT v6.1</h1>
            <p class="text-[9px] tracking-[0.5em] text-cyan-400 font-bold uppercase">Unpredictable Shadow Protocol</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <label class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800 text-center cursor-pointer">
                <span id="shadowStat" class="text-[10px] font-black text-cyan-400 uppercase">LOAD IMAGE</span>
                <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleShadow(this)">
            </label>
            <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800 text-center">
                <span class="text-[10px] font-black text-slate-500 uppercase">FEE: 0.0005 SOL (~$0.10)</span>
            </div>
        </div>

        <textarea id="msgInput" placeholder="Enter secure message..." class="w-full bg-slate-950/80 rounded-[2rem] p-6 h-32 text-slate-200 outline-none mb-6 border border-slate-800"></textarea>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="run('enc')" class="bg-cyan-500 text-slate-950 font-black py-5 rounded-2xl uppercase shadow-lg">ENCRYPT</button>
            <button onclick="run('dec')" class="bg-purple-600 text-white font-black py-5 rounded-2xl uppercase shadow-lg">DECRYPT (PAY)</button>
        </div>

        <div id="resArea" class="hidden">
            <div class="bg-cyan-500/5 border border-cyan-500/20 rounded-[2rem] p-6 text-center">
                <p id="resText" class="text-lg font-mono text-white break-words mb-4"></p>
                <div id="imgBox" class="hidden rounded-xl overflow-hidden border border-cyan-500/30">
                    <img id="resImg" src="" class="w-full">
                </div>
                <button id="actionBtn" class="mt-4 text-[10px] bg-white text-black px-8 py-2 rounded-full font-black uppercase">Download/Copy</button>
            </div>
        </div>
    </div>
    <canvas id="matrixCanvas" class="hidden"></canvas>

    <script>
        let userWallet = null;
        let shadowData = null;
        const FEE_RECIPIENT = "9sy2R9K4vS7eR5mKx...Cn88"; // Replace with your Cn88 address

        async function connectWallet() {
            if (window.solana?.isPhantom) {
                const resp = await window.solana.connect();
                userWallet = resp.publicKey;
                document.getElementById('connectBtn').innerText = userWallet.toString().slice(0,6) + "...";
            }
        }

        function handleShadow(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                shadowData = e.target.result; 
                document.getElementById('shadowStat').innerText = "READY";
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function run(mode) {
            if (!userWallet) return alert("Connect Wallet!");

            // PAYMENT GATE: Only for Decryption
            if (mode === 'dec') {
                try {
                    const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl("mainnet-beta"));
                    const transaction = new solanaWeb3.Transaction().add(
                        solanaWeb3.SystemProgram.transfer({
                            fromPubkey: userWallet,
                            toPubkey: new solanaWeb3.PublicKey(FEE_RECIPIENT),
                            lamports: 500000 // 0.0005 SOL (~10 cents)
                        })
                    );
                    const { blockhash } = await connection.getLatestBlockhash();
                    transaction.recentBlockhash = blockhash;
                    transaction.feePayer = userWallet;
                    const signed = await window.solana.signAndSendTransaction(transaction);
                    await connection.confirmTransaction(signed.signature);
                } catch (e) { return alert("Payment Failed or Cancelled."); }
            }

            // UNPREDICTABLE ENCRYPTION ENGINE
            if (shadowData) {
                const img = new Image(); img.src = shadowData;
                await new Promise(r => img.onload = r);
                const cvs = document.getElementById('matrixCanvas');
                const ctx = cvs.getContext('2d');
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
                const px = data.data;

                // Crypto-Random Salt
                let salt = mode === 'enc' ? Math.floor(Math.random() * 1000000) : parseInt(prompt("Enter Decryption Salt:"));
                let seed = salt + userWallet.toString().length;

                for (let i = 0; i < px.length; i += 4) {
                    px[i] = px[i] ^ (seed % 255);
                    seed = (seed * 16807) % 2147483647;
                }
                ctx.putImageData(data, 0, 0);
                const finalUrl = cvs.toDataURL("image/png");
                document.getElementById('resText').innerText = mode === 'enc' ? "Salt ID: " + salt : "Decrypted!";
                document.getElementById('resImg').src = finalUrl;
                document.getElementById('imgBox').classList.remove('hidden');
                document.getElementById('resArea').classList.remove('hidden');
                document.getElementById('actionBtn').onclick = () => {
                    const l = document.createElement('a'); l.href = finalUrl; l.download = "vault.png"; l.click();
                };
            }
        }
    </script>
</body>
</html>
